# Site settings
title: 上海市水土保持公示网
brief-intro: Shanghai Water and Soil Conservation Publicity
baseurl: "" # the subpath of your site, e.g. /blog
#url: "https://nie7yang.github.io" # the base hostname & protocol for your site

permalink: /:year/:month/:day/:title/

# other links
email: chaojizhuerchong@163.com

dribbble_username:

description_footer: 管理员

# comments
# two ways to comment, only choose one, and use your own short name
# 两种评论插件，选一个就好了，使用自己的 short_name

# statistic analysis 统计代码
# 百度统计 id，将统计代码替换为自己的百度统计id，即
# hm.src = "//hm.baidu.com/hm.js?xxxxxxxxxxxx";
# xxxxx字符串
google_analytics_id: UA-133169569-1 # google 分析追踪id

# Build settings
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

# port
# port: 1234

# url
category_dir: category/
tag_dir: tag/

# excerpt
excerpt_separator: "\n\n\n\n"

# paginate
plugins: [jekyll-paginate]
paginate: 6
port: 4001
